<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MasterGo to Figma Restorer</title>
  <meta name="description" content="Import and restore design asset zip bundles in Figma with pixel-perfect fidelity.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --background: #f8fafc;
      --foreground: #0f172a;
      --muted: #f1f5f9;
      --muted-foreground: #64748b;
      --card: #ffffff;
      --border: #e2e8f0;
      --input: #f8fafc;
      --primary: #0066cc;
      --primary-hover: #0052a3;
      --primary-foreground: #ffffff;
      --secondary: #f1f5f9;
      --secondary-foreground: #0f172a;
      --ring: rgba(0, 102, 204, 0.15);
      --destructive: #ef4444;
      --radius: 12px;
      --font-sans: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
    }

    body {
      margin: 0;
      font: 13px/1.5 var(--font-sans);
      color: var(--foreground);
      background: var(--background);
      -webkit-font-smoothing: antialiased;
      width: 400px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* App Header */
    .app-header {
      padding: 24px 20px 8px 20px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .app-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #09090b 30%, var(--primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0;
    }

    .app-subtitle {
      font-size: 12px;
      color: var(--muted-foreground);
      margin: 0;
    }

    main {
      flex: 1;
      min-height: 0;
      padding: 0 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    h1,
    p {
      margin: 0;
    }

    .muted {
      color: var(--muted-foreground);
      font-size: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05), 0 1px 2px -1px rgba(0, 0, 0, 0.05);
    }

    .card:hover {
      box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05), 0 2px 8px -1px rgba(0, 0, 0, 0.03);
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted-foreground);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .import-drop-card {
      height: 250px;
      border: 2px dashed rgba(0, 102, 204, 0.15);
      border-radius: var(--radius);
      padding: 0;
      background: rgba(0, 102, 204, 0.01);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .import-drop-card:hover {
      border-color: var(--primary);
      background: rgba(0, 102, 204, 0.03);
      box-shadow: 0 4px 20px -2px rgba(0, 102, 204, 0.05);
    }

    .import-drop-card.dragover {
      border-color: var(--primary);
      background: rgba(0, 102, 204, 0.06);
      box-shadow: 0 4px 24px -2px rgba(0, 102, 204, 0.08);
      transform: scale(1.01);
    }

    .drop-button {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 14px;
      color: var(--foreground);
      cursor: pointer;
    }

    .drop-button::before {
      content: "↓";
      font-size: 26px;
      font-weight: 500;
      color: var(--primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0, 102, 204, 0.08);
      transition: transform 0.2s ease;
    }

    .import-drop-card:hover .drop-button::before {
      transform: translateY(2px);
    }

    .file-state-card {
      padding: 12px 16px;
    }

    .compact-row {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 12px;
    }

    .file-name {
      flex: 1;
      color: var(--foreground);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-button {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted-foreground);
      font: inherit;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .icon-button:hover {
      background: var(--secondary);
      color: var(--foreground);
    }

    .page-card {
      padding: 0;
      overflow: hidden;
      gap: 0;
    }

    .page-header {
      min-height: 48px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.01);
    }

    .page-list {
      display: grid;
      max-height: 228px;
      overflow: auto;
      background: var(--background);
      align-content: start;
      grid-auto-rows: max-content;
    }

    .page-row {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 10px;
      align-items: center;
      min-height: 40px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }

    .page-row:hover:not(.disabled) {
      background: rgba(0, 102, 204, 0.03);
    }

    .page-row:last-child {
      border-bottom: 0;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--primary);
      cursor: pointer;
      border-radius: 4px;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .page-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0 10px;
      color: var(--muted-foreground);
      font-size: 11px;
      background: rgba(0, 0, 0, 0.02);
      white-space: nowrap;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.04);
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--primary) 0%, #3b82f6 100%);
      border-radius: 999px;
      transition: width 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    .status-line {
      min-height: 20px;
      color: var(--foreground);
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary {
      color: var(--muted-foreground);
      font-size: 12px;
    }

    .file-name {
      min-width: 0;
      color: var(--muted-foreground);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    .icon-button {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted-foreground);
      font: inherit;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
    }

    .icon-button:hover {
      background: var(--secondary);
      color: var(--foreground);
    }

    .hidden {
      display: none !important;
    }



    .card {
      border-color: var(--border);
      border-radius: 8px;
      padding: 16px;
      gap: 8px;
    }

    .import-drop-card {
      height: 316px;
      flex: 0 0 316px;
      padding: 0;
      align-items: center;
      justify-content: center;
    }

    .drop-button {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 8px;
      background: transparent;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      line-height: 16px;
      font-weight: 400;
      color: var(--foreground);
    }

    .drop-button::before {
      content: "+";
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      background: var(--secondary);
      color: var(--foreground);
      font-size: 18px;
      line-height: 20px;
    }

    #fileHint {
      display: none;
    }

    .file-state-card,
    .rules-card {
      height: 64px;
      flex: 0 0 64px;
      padding: 16px;
    }

    .page-card {
      height: 280px;
      flex: 0 0 280px;
      padding: 0;
    }

    .page-header {
      height: 48px;
      min-height: 48px;
      padding: 16px;
      border-bottom-color: var(--border);
      grid-template-columns: minmax(0, 1fr) max-content;
      column-gap: 12px;
    }

    .page-list {
      height: 232px;
      max-height: 232px;
      border: 0;
      border-radius: 0;
      background: var(--background);
      align-content: start;
      grid-auto-rows: max-content;
    }

    .page-row {
      height: 44px;
      min-height: 44px;
      padding: 12px 16px;
      grid-template-columns: 16px minmax(0, 1fr) auto;
      gap: 8px;
      border-bottom: 0;
    }

    .page-row:first-child {
      height: 40px;
      min-height: 40px;
    }

    input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      width: 16px;
      height: 16px;
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--background);
      cursor: pointer;
      flex: 0 0 16px;
    }

    input[type="checkbox"]:checked {
      border-color: var(--primary);
      background: var(--primary);
    }

    input[type="checkbox"]:checked::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: solid var(--primary-foreground);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    input[type="checkbox"]:indeterminate {
      border-color: var(--border);
      background: var(--background);
    }

    input[type="checkbox"]:indeterminate::after {
      content: "";
      position: absolute;
      left: 3px;
      top: 3px;
      width: 8px;
      height: 8px;
      border: 0;
      border-radius: 2px;
      background: var(--primary);
      transform: none;
    }

    input[type="checkbox"]:disabled {
      cursor: not-allowed;
    }

    .checkbox-label {
      gap: 8px;
      font-size: 14px;
      line-height: 16px;
      font-weight: 400;
      color: var(--foreground);
    }

    .page-name {
      font-size: 13px;
      line-height: 20px;
      font-weight: 400;
      color: var(--foreground);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-row input:checked+.page-name {
      font-size: 14px;
      line-height: 16px;
    }

    .muted,
    #pageSummary {
      font-size: 14px;
      line-height: 16px;
      color: var(--muted-foreground);
    }

    .badge {
      height: 16px;
      min-width: 0;
      padding: 0;
      border: 0;
      border-radius: 0;
      font-size: 14px;
      line-height: 16px;
      color: var(--muted-foreground);
      background: transparent;
    }

    .rule-row,
    .compact-row {
      min-height: 32px;
      display: grid;
      grid-template-columns: 56px 24px minmax(0, 1fr) 24px;
      gap: 0;
      align-items: center;
      padding: 0;
    }

    .card-title {
      grid-column: 1;
      font-size: 14px;
      line-height: 16px;
      font-weight: 400;
      color: var(--foreground);
    }

    .button {
      height: 32px;
      border: 0;
      border-radius: 4px;
      padding: 8px;
      font-size: 14px;
      line-height: 16px;
      font-weight: 400;
    }

    .button-secondary {
      grid-column: 3 / 5;
      justify-self: end;
      width: 72px;
      background: var(--secondary);
      color: var(--secondary-foreground);
    }

    .file-name {
      grid-column: 3;
      width: 100%;
      text-align: left;
      font-size: 13px;
      line-height: 16px;
      color: var(--muted-foreground);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .icon-button {
      grid-column: 4;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      color: var(--muted-foreground);
    }

    .status-card {
      height: 96px;
      flex: 0 0 96px;
      margin-top: 16px;
      padding: 16px;
      gap: 6px;
    }

    .progress-track {
      height: 8px;
      margin-bottom: 8px;
      border-radius: 3.361px;
      background: var(--secondary);
    }

    .progress-bar {
      background: var(--primary);
    }

    .status-line {
      min-height: 16px;
      font-size: 14px;
      line-height: 16px;
      font-weight: 600;
      color: var(--foreground);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .summary {
      font-size: 13px;
      line-height: 16px;
      color: var(--muted-foreground);
    }

    .button-primary {
      height: 32px;
      flex: 0 0 32px;
      width: 100%;
      min-width: 80px;
      border: 0;
      border-radius: 4px;
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .button-primary:disabled {
      opacity: 0.4;
      background: var(--primary);
      color: var(--primary-foreground);
    }

    .button:disabled,
    .button.disabled,
    .drop-button.disabled,
    .page-row.disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }

    .error {
      color: var(--destructive);
    }
  

    /* v14: resizable plugin window */
    html {
      width: 100%;
      height: 100%;
    }

    body {
      width: 100vw !important;
      height: 100vh !important;
      min-width: 360px;
      min-height: 420px;
    }

    .window-tools {
      position: fixed;
      top: 8px;
      right: 10px;
      z-index: 10050;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
      user-select: none;
    }

    .window-tools-label {
      padding: 0 4px 0 6px;
      color: var(--muted-foreground);
      font-size: 10px;
      font-weight: 600;
    }

    .window-size-button {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--foreground);
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .window-size-button:hover {
      background: var(--muted);
    }

    .window-resize-handle {
      position: fixed;
      right: 0;
      bottom: 0;
      z-index: 10060;
      width: 28px;
      height: 28px;
      cursor: nwse-resize;
      touch-action: none;
      user-select: none;
      border-bottom-right-radius: 8px;
      background:
        linear-gradient(135deg, transparent 0 52%, rgba(100, 116, 139, 0.16) 52% 58%, transparent 58% 100%),
        linear-gradient(135deg, transparent 0 64%, rgba(100, 116, 139, 0.28) 64% 70%, transparent 70% 100%),
        linear-gradient(135deg, transparent 0 76%, rgba(100, 116, 139, 0.42) 76% 82%, transparent 82% 100%);
    }

    .window-resize-handle:hover {
      background:
        linear-gradient(135deg, transparent 0 52%, rgba(0, 102, 204, 0.18) 52% 58%, transparent 58% 100%),
        linear-gradient(135deg, transparent 0 64%, rgba(0, 102, 204, 0.34) 64% 70%, transparent 70% 100%),
        linear-gradient(135deg, transparent 0 76%, rgba(0, 102, 204, 0.52) 76% 82%, transparent 82% 100%);
    }

    body.is-resizing, body.is-resizing * {
      cursor: nwse-resize !important;
      user-select: none !important;
    }

  </style>
</head>

<body>
  <div class="window-tools" aria-label="窗口大小">
    <span class="window-tools-label">窗口</span>
    <button class="window-size-button" type="button" data-window-size="small" title="小窗口">小</button>
    <button class="window-size-button" type="button" data-window-size="medium" title="中窗口">中</button>
    <button class="window-size-button" type="button" data-window-size="large" title="大窗口">大</button>
  </div>
  <div class="window-resize-handle" id="windowResizeHandle" title="拖拽调整窗口大小"></div>

  <header class="app-header">
    <h1 class="app-title">MasterGo to Figma</h1>
    <p class="app-subtitle muted">导入并完美还原 MasterGo 设计资产包</p>
  </header>
  <main>
    <section class="card file-state-card hidden" id="fileState">
      <div class="compact-row">
        <div class="card-title">导入</div>
        <span class="file-name" id="fileNameState"></span>
        <button class="icon-button" id="deleteZip" type="button" title="移除文件">×</button>
      </div>
    </section>

    <section class="card import-drop-card" id="fileDropCard">
      <label class="drop-button" id="fileButton" for="zipInput">
        <span id="fileTitle">选择 zip / .mg 文件</span>
        <span class="muted" id="fileHint">支持 SendToFigma 导出的 zip 与 MasterGo 导出的 .mg</span>
      </label>
      <input class="file-input" id="zipInput" type="file" multiple accept=".zip,.mg,application/zip">
    </section>

    <section class="card page-card hidden" id="pageCard">
      <div class="page-header">
        <label class="checkbox-label">
          <input id="selectAllPages" type="checkbox">
          <span>全选</span>
        </label>
        <span class="muted" id="pageSummary">0 page, 0 layers</span>
      </div>
      <div class="page-list" id="pageList"></div>
    </section>

    <section class="card status-card">
      <div class="progress-track" aria-hidden="true">
        <div class="progress-bar" id="bar"></div>
      </div>
      <div class="status-line" id="status">准备就绪</div>
      <div class="summary" id="summary">选择 zip 或 .mg 文件后可开始还原。</div>
    </section>

    <button class="button button-primary" id="restore" disabled>开始</button>
  </main>

  <script>
    const zipInput = document.getElementById("zipInput");
    const fileDropCard = document.getElementById("fileDropCard");
    const fileState = document.getElementById("fileState");
    const fileNameState = document.getElementById("fileNameState");
    const deleteZip = document.getElementById("deleteZip");
    const fileButton = document.getElementById("fileButton");
    const fileTitle = document.getElementById("fileTitle");
    const fileHint = document.getElementById("fileHint");
    const pageCard = document.getElementById("pageCard");
    const pageList = document.getElementById("pageList");
    const selectAllPages = document.getElementById("selectAllPages");
    const pageSummary = document.getElementById("pageSummary");
    const restore = document.getElementById("restore");
    const bar = document.getElementById("bar");
    const status = document.getElementById("status");
    const summary = document.getElementById("summary");

    let manifest = null;
    let entries = {};
    let packageRoot = "";
    let pages = [];
    let isBusy = false;
    let hasRules = true;
    let restoreStartMs = 0;
    let importProgressMode = "idle";
    let importPrepareUnitsTotal = 0;
    let importPrepareUnitsDone = 0;
    let importRestoreTotal = 0;
    let importTransferSeq = 0;
    let importRequestSeq = 0;
    const importAckResolvers = {};
    const IMPORT_CHUNK_SIZE = 64 * 1024;
    const IMPORT_YIELD_EVERY_CHUNKS = 32;

    function send(pluginMessage) {
      parent.postMessage({ pluginMessage }, "*");
    }

    const WINDOW_SIZE_KEY = "mastergo2figma.pluginWindowSize.v14";
    const WINDOW_SIZE_PRESETS = {
      small: { width: 380, height: 560 },
      medium: { width: 480, height: 680 },
      large: { width: 640, height: 780 }
    };
    const WINDOW_SIZE_LIMITS = { minWidth: 360, minHeight: 420, maxWidth: 960, maxHeight: 900 };
    let pluginWindowSize = readSavedWindowSize();

    function readSavedWindowSize() {
      try {
        const saved = JSON.parse(localStorage.getItem(WINDOW_SIZE_KEY) || "null");
        if (saved && Number.isFinite(saved.width) && Number.isFinite(saved.height)) {
          return clampWindowSize(saved.width, saved.height);
        }
      } catch (_) {}
      return clampWindowSize(window.innerWidth || 400, window.innerHeight || 640);
    }

    function clampWindowSize(width, height) {
      return {
        width: Math.round(Math.min(WINDOW_SIZE_LIMITS.maxWidth, Math.max(WINDOW_SIZE_LIMITS.minWidth, Number(width) || 400))),
        height: Math.round(Math.min(WINDOW_SIZE_LIMITS.maxHeight, Math.max(WINDOW_SIZE_LIMITS.minHeight, Number(height) || 640)))
      };
    }

    function resizePluginWindow(width, height, persist = true) {
      pluginWindowSize = clampWindowSize(width, height);
      if (persist) {
        try { localStorage.setItem(WINDOW_SIZE_KEY, JSON.stringify(pluginWindowSize)); } catch (_) {}
      }
      send({ type: "resize", width: pluginWindowSize.width, height: pluginWindowSize.height });
    }

    function ensurePluginWindowAtLeast(width, height) {
      const next = clampWindowSize(
        Math.max(pluginWindowSize.width, Number(width) || pluginWindowSize.width),
        Math.max(pluginWindowSize.height, Number(height) || pluginWindowSize.height)
      );
      resizePluginWindow(next.width, next.height, false);
    }

    function initManualWindowResize(defaultWidth = 400, defaultHeight = 640) {
      pluginWindowSize = clampWindowSize(pluginWindowSize.width || defaultWidth, pluginWindowSize.height || defaultHeight);
      if (pluginWindowSize.width !== defaultWidth || pluginWindowSize.height !== defaultHeight) {
        setTimeout(() => resizePluginWindow(pluginWindowSize.width, pluginWindowSize.height, false), 50);
      }

      document.querySelectorAll("[data-window-size]").forEach(button => {
        button.addEventListener("click", () => {
          const preset = WINDOW_SIZE_PRESETS[button.dataset.windowSize] || WINDOW_SIZE_PRESETS.medium;
          resizePluginWindow(preset.width, preset.height, true);
        });
      });

      const handle = document.getElementById("windowResizeHandle");
      if (!handle) return;
      let startX = 0;
      let startY = 0;
      let startWidth = pluginWindowSize.width;
      let startHeight = pluginWindowSize.height;
      let active = false;

      function onMove(event) {
        if (!active) return;
        const clientX = event.clientX ?? (event.touches && event.touches[0] && event.touches[0].clientX) ?? startX;
        const clientY = event.clientY ?? (event.touches && event.touches[0] && event.touches[0].clientY) ?? startY;
        resizePluginWindow(startWidth + clientX - startX, startHeight + clientY - startY, false);
      }

      function onUp() {
        if (!active) return;
        active = false;
        document.body.classList.remove("is-resizing");
        try { localStorage.setItem(WINDOW_SIZE_KEY, JSON.stringify(pluginWindowSize)); } catch (_) {}
        window.removeEventListener("mousemove", onMove, true);
        window.removeEventListener("mouseup", onUp, true);
        window.removeEventListener("touchmove", onMove, true);
        window.removeEventListener("touchend", onUp, true);
      }

      function onDown(event) {
        active = true;
        startX = event.clientX ?? (event.touches && event.touches[0] && event.touches[0].clientX) ?? 0;
        startY = event.clientY ?? (event.touches && event.touches[0] && event.touches[0].clientY) ?? 0;
        startWidth = pluginWindowSize.width || window.innerWidth || defaultWidth;
        startHeight = pluginWindowSize.height || window.innerHeight || defaultHeight;
        document.body.classList.add("is-resizing");
        event.preventDefault();
        window.addEventListener("mousemove", onMove, true);
        window.addEventListener("mouseup", onUp, true);
        window.addEventListener("touchmove", onMove, true);
        window.addEventListener("touchend", onUp, true);
      }

      handle.addEventListener("mousedown", onDown);
      handle.addEventListener("touchstart", onDown, { passive: false });
    }


    function setBusy(nextBusy) {
      isBusy = nextBusy;
      restore.disabled = nextBusy || !hasRules || pages.length === 0 || getSelectedPageIds().length === 0;
      zipInput.disabled = nextBusy;
      deleteZip.disabled = nextBusy;
      selectAllPages.disabled = nextBusy || pages.length === 0;
      fileButton.classList.toggle("disabled", nextBusy);
      pageList.querySelectorAll("input").forEach(input => {
        input.disabled = nextBusy;
        input.closest(".page-row").classList.toggle("disabled", nextBusy);
      });
    }

    function setStatus(message, detail, isError) {
      status.textContent = message;
      status.classList.toggle("error", !!isError);
      if (detail !== undefined) summary.textContent = detail;
    }

    function setProgress(current, total, label) {
      let percent = total > 0 ? Math.round((current / total) * 100) : 0;
      let detail = total > 0 ? `${current}/${total} 个图层，${percent}% · 预计剩余 ${formatEta(current, total)}` : "正在准备任务...";
      if (importProgressMode === "prepare" && total > 0) {
        percent = Math.round((current / total) * 50);
        detail = `${current}/${total} 项准备任务，${percent}% · 正式导入前`;
      } else if (importProgressMode === "restore" && total > 0) {
        const restorePercent = current / total;
        percent = Math.round(50 + restorePercent * 50);
        detail = `${current}/${total} 个图层，${percent}% · 预计剩余 ${formatEta(current, total)}`;
      }
      bar.style.width = `${Math.max(0, Math.min(100, percent))}%`;
      setStatus(
        label || "处理中...",
        detail,
        false
      );
    }

    function beginImportPrepareProgress(selectedPages) {
      importProgressMode = "prepare";
      importPrepareUnitsDone = 0;
      importRestoreTotal = selectedPages.reduce((sum, page) => sum + (page.layerCount || 0), 0);
      importPrepareUnitsTotal = Math.max(1, selectedPages.reduce((sum, page) => {
        return sum + (page.layerCount || 0) * 3 + 20;
      }, 0));
      setPrepareProgress("正在整理 zip 数据...");
    }

    function setPrepareProgress(label) {
      if (importProgressMode !== "prepare") {
        if (label) setStatus(label, summary.textContent, false);
        return;
      }
      setProgress(Math.min(importPrepareUnitsDone, importPrepareUnitsTotal), importPrepareUnitsTotal, label);
    }

    function advancePrepareProgress(units, label) {
      if (importProgressMode !== "prepare") {
        if (label) setStatus(label, summary.textContent, false);
        return;
      }
      importPrepareUnitsDone = Math.min(importPrepareUnitsTotal, importPrepareUnitsDone + Math.max(0, units || 0));
      setPrepareProgress(label);
    }

    function beginImportRestoreProgress(label) {
      importProgressMode = "restore";
      setProgress(0, importRestoreTotal, label || "正在开始正式导入...");
    }

    function resetImportProgressMode() {
      importProgressMode = "idle";
      importPrepareUnitsTotal = 0;
      importPrepareUnitsDone = 0;
      importRestoreTotal = 0;
    }

    function formatEta(current, total) {
      if (!restoreStartMs || !total || current <= 0 || current >= total) return "--";
      const elapsed = Date.now() - restoreStartMs;
      const remainingMs = Math.max(0, (elapsed / current) * (total - current));
      const seconds = Math.ceil(remainingMs / 1000);
      if (seconds < 60) return `${seconds}s`;
      const minutes = Math.floor(seconds / 60);
      const rest = seconds % 60;
      return `${minutes}m ${rest}s`;
    }

    // Drag and drop event listeners
    fileDropCard.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (isBusy) return;
      fileDropCard.classList.add("dragover");
    });

    fileDropCard.addEventListener("dragleave", () => {
      fileDropCard.classList.remove("dragover");
    });

    fileDropCard.addEventListener("drop", async (e) => {
      e.preventDefault();
      fileDropCard.classList.remove("dragover");
      if (isBusy) return;
      const files = e.dataTransfer && e.dataTransfer.files;
      if (files && files.length > 0) {
        await handleZipFiles(files);
      }
    });

    zipInput.onchange = async () => {
      if (zipInput.files && zipInput.files.length > 0) {
        await handleZipFiles(zipInput.files);
      }
    };

    async function handleZipFiles(files) {
      if (isBusy) return;

      try {
        setBusy(true);

        // Initialize merged manifest
        const mergedManifest = {
          schema: "mastergo2figma.package.v2",
          version: 2,
          source: "mastergo",
          exportedAt: new Date().toISOString(),
          scope: "composite-pages",
          pages: [],
          assets: {},
          stats: {
            pageCount: 0,
            layerCount: 0,
            imageAssetCount: 0,
            missingImageAssetCount: 0
          }
        };

        // Reset global entries
        entries = {};
        const fileNames = [];

        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          fileNames.push(file.name);

          setProgress(0, 0, `正在解析 (${i + 1}/${files.length}): ${file.name}...`);

          const buffer = await file.arrayBuffer();
          let zipEntries = await readZipEntries(buffer);

          // MasterGo's native .mg export is also a zip, but instead of a v2
          // manifest it stores a binary "document" + meta.json + images/.
          // Convert it into the same in-memory v2 package the rest of the
          // pipeline already understands, so nothing downstream has to change.
          if (window.MasterGoMg.isMgPackage(file.name, zipEntries)) {
            setProgress(0, 0, `正在解析 .mg (${i + 1}/${files.length}): ${file.name}...`);
            zipEntries = window.MasterGoMg.convertMgPackageToV2Entries(zipEntries, file.name);
          }

          const manifestPath = findManifestPath(zipEntries);
          if (!manifestPath) {
            throw new Error(`文件 "${file.name}" 中没有 manifest.json`);
          }

          const zipPackageRoot = manifestPath.slice(0, manifestPath.length - "manifest.json".length);

          // Get manifest content
          const manifestBytes = zipEntries[manifestPath];
          if (!manifestBytes) {
            throw new Error(`无法读取 "${file.name}" 的 manifest.json`);
          }

          const zipManifest = JSON.parse(decodeUtf8(manifestBytes));
          if (zipManifest.schema !== "mastergo2figma.package.v2" || zipManifest.version !== 2) {
            throw new Error(`文件 "${file.name}" 不是 v2 导出包，请使用新版 SendToFigma 重新导出。`);
          }
          if (!zipManifest.pages || !Array.isArray(zipManifest.pages)) {
            throw new Error(`文件 "${file.name}" 的 manifest.json 格式不正确`);
          }

          // Copy entries into global entries with prefix "zip_${i}/"
          for (const path in zipEntries) {
            entries[`zip_${i}/${path}`] = zipEntries[path];
          }

          // Merge pages
          for (const page of zipManifest.pages) {
            const mergedPage = {
              ...page,
              id: `zip_${i}_${page.id}`,
              pageFile: `zip_${i}/${zipPackageRoot}${page.pageFile}`,
              zipIndex: i,
              zipPackageRoot: zipPackageRoot
            };
            mergedManifest.pages.push(mergedPage);
          }

          // Merge assets
          if (zipManifest.assets && typeof zipManifest.assets === "object") {
            for (const key in zipManifest.assets) {
              const asset = zipManifest.assets[key];
              if (asset) {
                const mergedKey = `zip_${i}_${key}`;
                mergedManifest.assets[mergedKey] = {
                  ...asset,
                  key: mergedKey,
                  path: asset.path ? `zip_${i}/${zipPackageRoot}${asset.path}` : ""
                };
              }
            }
          }

          // Accumulate stats
          mergedManifest.stats.pageCount += zipManifest.stats?.pageCount || zipManifest.pages.length || 0;
          mergedManifest.stats.layerCount += zipManifest.stats?.layerCount || 0;
          mergedManifest.stats.imageAssetCount += zipManifest.stats?.imageAssetCount || 0;
          mergedManifest.stats.missingImageAssetCount += zipManifest.stats?.missingImageAssetCount || 0;
        }

        manifest = mergedManifest;

        // Show file state
        const fileCount = files.length;
        if (fileCount === 1) {
          fileNameState.textContent = fileNames[0];
          fileNameState.title = fileNames[0];
        } else {
          fileNameState.textContent = `已导入 ${fileCount} 个 zip 文件`;
          fileNameState.title = fileNames.join("\n");
        }

        const imageAssetCount = manifest.stats.imageAssetCount || 0;
        const missingImageAssetCount = manifest.stats.missingImageAssetCount || 0;
        fileHint.textContent = `${manifest.pages.length} 个页面，${manifest.stats.layerCount || 0} 个图层，${imageAssetCount} 个图片资源${missingImageAssetCount ? `，${missingImageAssetCount} 个图片缺失` : ""}`;

        fileDropCard.classList.add("hidden");
        fileState.classList.remove("hidden");
        renderPages(manifest.pages);
        
        // Resize window to show pages list cleanly
        ensurePluginWindowAtLeast(400, 630);

        bar.style.width = "0%";
        setStatus("zip 已读取", "请选择需要还原的页面。", false);

      } catch (error) {
        resetZipState();
        setStatus(error.message || "文件解析失败", "请确认文件为 SendToFigma 导出的 zip 或 MasterGo 导出的 .mg。", true);
      } finally {
        setBusy(false);
      }
    }

    deleteZip.onclick = () => {
      if (isBusy) return;
      resetZipState();
      setStatus("准备就绪", "导入会在当前 Figma 文件中新建还原页面。", false);
    };

    function resetZipState() {
      manifest = null;
      entries = {};
      packageRoot = "";
      pages = [];
      zipInput.value = "";
      fileNameState.textContent = "";
      fileTitle.textContent = "选择 zip / .mg 文件";
      fileHint.textContent = "支持 SendToFigma 导出的 zip 与 MasterGo 导出的 .mg";
      pageList.innerHTML = "";
      pageList.classList.remove("visible");
      pageCard.classList.add("hidden");
      fileDropCard.classList.remove("hidden");
      fileState.classList.add("hidden");

      // Resize window to standard size
      ensurePluginWindowAtLeast(400, 630);

      updatePageSelection();
    }

    function renderPages(nextPages) {
      pages = nextPages || [];
      pageList.innerHTML = "";
      if (pages.length === 0) {
        pageList.classList.remove("visible");
        pageCard.classList.add("hidden");
        updatePageSelection();
        return;
      }
      for (const page of pages) {
        const displayName = page.originalName || page.name;
        const row = document.createElement("label");
        row.className = "page-row";
        row.innerHTML = `
          <input type="checkbox" value="${escapeHtml(page.id)}" checked>
          <span class="page-name" title="${escapeHtml(page.name)}">${escapeHtml(displayName)}</span>
          <span class="badge">${page.layerCount || 0}</span>
        `;
        pageList.appendChild(row);
      }
      pageList.classList.add("visible");
      pageCard.classList.remove("hidden");
      pageList.querySelectorAll("input").forEach(input => {
        input.onchange = updatePageSelection;
      });
      updatePageSelection();
    }

    function updatePageSelection() {
      const selectedIds = getSelectedPageIds();
      const selectedSet = new Set(selectedIds);
      const selectedPages = pages.filter(page => selectedSet.has(page.id));
      const selectedLayerCount = selectedPages.reduce((sum, page) => sum + (page.layerCount || 0), 0);
      pageSummary.textContent = `${selectedPages.length} page${selectedPages.length === 1 ? "" : "s"}, ${selectedLayerCount} layers`;
      selectAllPages.checked = pages.length > 0 && selectedIds.length === pages.length;
      selectAllPages.indeterminate = selectedIds.length > 0 && selectedIds.length < pages.length;
      setBusy(isBusy);
    }

    selectAllPages.onchange = () => {
      pageList.querySelectorAll("input").forEach(input => {
        input.checked = selectAllPages.checked;
      });
      updatePageSelection();
    };

    restore.onclick = async () => {
      if (isBusy) return;
      if (!hasRules) {
        setStatus("请先导入转换规则 JSON", "", true);
        return;
      }

      const selectedIds = getSelectedPageIds();
      if (selectedIds.length === 0) {
        setStatus("请至少选择一个页面", "", true);
        return;
      }

      try {
        setBusy(true);
        restoreStartMs = Date.now();
        if (manifest) {
          const selectedSet = new Set(selectedIds);
          const selectedPages = pages.filter(page => selectedSet.has(page.id));
          beginImportPrepareProgress(selectedPages);
          await streamImportPayload(manifest, selectedPages);
        } else {
          throw new Error("请先选择有效的 MasterGo2Figma zip");
        }
      } catch (error) {
        setStatus(error.message || "导入数据整理失败", "", true);
        resetImportProgressMode();
        setBusy(false);
      }
    };

    function getSelectedPageIds() {
      return [...pageList.querySelectorAll("input:checked")].map(input => input.value);
    }

    function prefixImageRefs(obj, prefix) {
      if (!obj || typeof obj !== "object") return;
      if (Array.isArray(obj)) {
        for (let i = 0; i < obj.length; i++) {
          prefixImageRefs(obj[i], prefix);
        }
      } else {
        if (obj.type === "IMAGE" && typeof obj.imageRef === "string") {
          obj.imageRef = prefix + obj.imageRef;
        }
        for (const key in obj) {
          if (Object.prototype.hasOwnProperty.call(obj, key)) {
            prefixImageRefs(obj[key], prefix);
          }
        }
      }
    }

    function prefixConnectorEndpointNodeIds(obj, prefix) {
      if (!obj || typeof obj !== "object") return;
      if (Array.isArray(obj)) {
        for (let i = 0; i < obj.length; i++) {
          prefixConnectorEndpointNodeIds(obj[i], prefix);
        }
      } else {
        if (typeof obj.endpointNodeId === "string") {
          obj.endpointNodeId = prefix + obj.endpointNodeId;
        }
        for (const key in obj) {
          if (Object.prototype.hasOwnProperty.call(obj, key)) {
            prefixConnectorEndpointNodeIds(obj[key], prefix);
          }
        }
      }
    }

    async function streamImportPayload(sourceManifest, selectedPages) {
      const transferId = `import_${Date.now()}_${++importTransferSeq}`;
      const totalNodes = selectedPages.reduce((sum, page) => sum + (page.layerCount || 0), 0);
      const selectedManifest = {
        ...sourceManifest,
        pages: selectedPages.map(page => ({
          id: page.id,
          name: page.name,
          folder: page.folder,
          pageFile: page.pageFile,
          layerCount: page.layerCount || 0
        })),
        stats: {
          ...(sourceManifest.stats || {}),
          pageCount: selectedPages.length,
          layerCount: totalNodes
        }
      };
      const sentAssetPaths = {};

      await sendImportRequest({
        type: "import-session-start",
        transferId,
        manifest: selectedManifest,
        totalPages: selectedPages.length,
        totalNodes
      });
      advancePrepareProgress(5, "已建立导入会话");

      for (let pageIndex = 0; pageIndex < selectedPages.length; pageIndex++) {
        const page = selectedPages[pageIndex];
        setPrepareProgress(`正在准备页面：${page.name || page.id}`);
        const pageData = buildPageImportData(page);
        const assetTransfers = getRequiredAssetTransfers(sourceManifest, pageData.assetKeys, sentAssetPaths);
        for (const asset of assetTransfers) {
          await streamImportAsset(transferId, asset);
        }

        setPrepareProgress(`正在发送页面：${pageData.page.name || pageData.page.id}`);
        await sendImportRequest({
          type: "import-page-start",
          transferId,
          pageIndex,
          page: pageData.page
        }, 30000);
        advancePrepareProgress(1, `正在发送页面：${pageData.page.name || pageData.page.id}`);
        for (let chunkIndex = 0; chunkIndex < pageData.layerChunks.length; chunkIndex++) {
          const records = pageData.layerChunks[chunkIndex];
          send({
            type: "import-page-chunk",
            transferId,
            pageIndex,
            chunkIndex,
            records
          });
          advancePrepareProgress(records.length, `正在发送页面数据：${pageData.page.name || pageData.page.id}`);
          if ((chunkIndex + 1) % IMPORT_YIELD_EVERY_CHUNKS === 0) await waitForUIRelease();
        }
        await sendImportRequest({
          type: "import-page-end",
          transferId,
          pageIndex
        }, 120000);
        advancePrepareProgress(5, `页面数据已发送：${pageData.page.name || pageData.page.id}`);
      }

      importPrepareUnitsDone = importPrepareUnitsTotal;
      setPrepareProgress("准备完成，正在进入正式导入...");
      if (importProgressMode === "prepare") beginImportRestoreProgress("正在完成还原...");
      send({ type: "import-session-complete", transferId });
    }

    function buildPageImportData(page) {
      const layers = {};
      const assetKeys = {};
      if (!page.pageFile) throw new Error(`页面缺少索引文件：${page.name || page.id}`);
      const pageBytes = getPackageEntry(page.pageFile);
      if (!pageBytes) throw new Error(`缺少页面索引文件：${page.pageFile}`);
      const pageIndex = JSON.parse(decodeUtf8(pageBytes));
      if (pageIndex.schema !== "mastergo2figma.page.v2" || pageIndex.version !== 2) {
        throw new Error(`页面索引格式不正确：${page.pageFile}`);
      }
      if (!Array.isArray(pageIndex.layerChunks)) throw new Error(`页面缺少图层分块索引：${page.pageFile}`);

      const zipIndex = page.zipIndex;
      const zipPackageRoot = page.zipPackageRoot;
      const prefix = `zip_${zipIndex}_`;

      pageIndex.id = `${prefix}${pageIndex.id}`;
      if (Array.isArray(pageIndex.rootNodeIds)) {
        pageIndex.rootNodeIds = pageIndex.rootNodeIds.map(rid => `${prefix}${rid}`);
      }

      const rawRecordsById = {};
      for (let chunkIndex = 0; chunkIndex < pageIndex.layerChunks.length; chunkIndex++) {
        const chunkPath = pageIndex.layerChunks[chunkIndex];
        const fullChunkPath = `zip_${zipIndex}/${zipPackageRoot}${chunkPath}`;
        const bytes = getPackageEntry(fullChunkPath);
        if (!bytes) throw new Error(`缺少图层分块文件：${fullChunkPath}`);
        const chunk = JSON.parse(decodeUtf8(bytes));

        if (chunk.schema === "mastergo2figma.layers.v2" && Array.isArray(chunk.records)) {
          for (const record of chunk.records) {
            if (record && record.id) rawRecordsById[record.id] = record;
          }
          advancePrepareProgress(chunk.records.length, `正在解析图层分块 ${chunkIndex + 1}/${pageIndex.layerChunks.length}：${page.name || page.id}`);
          continue;
        }

        if (chunk && chunk.id && chunk.props) {
          rawRecordsById[chunk.id] = chunk;
          advancePrepareProgress(1, `正在解析图层分块 ${chunkIndex + 1}/${pageIndex.layerChunks.length}：${page.name || page.id}`);
          continue;
        }

        if (chunk && chunk.record && chunk.record.id) {
          rawRecordsById[chunk.record.id] = chunk.record;
          advancePrepareProgress(1, `正在解析图层分块 ${chunkIndex + 1}/${pageIndex.layerChunks.length}：${page.name || page.id}`);
          continue;
        }

        throw new Error(`图层分块格式不正确：${chunkPath}`);
      }

      const reachableIds = collectReachableLayerIds(pageIndex.rootNodeIds, rawRecordsById, prefix);
      let lastOrganizedCount = 0;
      for (let index = 0; index < reachableIds.length; index++) {
        const rawId = reachableIds[index];
        const record = rawRecordsById[rawId];
        const nextRecord = cloneJson(record);
        nextRecord.id = `${prefix}${nextRecord.id}`;
        if (nextRecord.parentId) nextRecord.parentId = `${prefix}${nextRecord.parentId}`;
        if (Array.isArray(nextRecord.childIds)) {
          nextRecord.childIds = nextRecord.childIds.map(cid => `${prefix}${cid}`);
        }
        if (nextRecord.props) {
          prefixImageRefs(nextRecord.props, prefix);
          prefixConnectorEndpointNodeIds(nextRecord.props, prefix);
          collectImageRefs(nextRecord.props, assetKeys);
        }
        layers[nextRecord.id] = nextRecord;
        if ((index + 1) % 100 === 0 || index + 1 === reachableIds.length) {
          const organizedCount = index + 1;
          advancePrepareProgress(organizedCount - lastOrganizedCount, `正在整理图层 ${organizedCount}/${reachableIds.length}：${page.name || page.id}`);
          lastOrganizedCount = organizedCount;
        }
      }

      if (Array.isArray(pageIndex.layerChunks)) {
        pageIndex.layerChunks = pageIndex.layerChunks.map(chunkPath => `zip_${zipIndex}/${zipPackageRoot}${chunkPath}`);
      }

      return {
        page: pageIndex,
        layerChunks: chunkLayerRecords(layers),
        assetKeys
      };
    }

    function chunkLayerRecords(layers) {
      const chunks = [];
      let records = [];
      let bytes = 0;
      function flush() {
        if (records.length === 0) return;
        chunks.push(records);
        records = [];
        bytes = 0;
      }
      for (const id in layers) {
        const record = layers[id];
        const recordBytes = JSON.stringify(record).length;
        if (records.length > 0 && (records.length >= 16 || bytes + recordBytes > 64 * 1024)) flush();
        records.push(record);
        bytes += recordBytes + (records.length > 1 ? 1 : 0);
        if (records.length >= 16 || bytes >= 64 * 1024) flush();
      }
      flush();
      return chunks;
    }

    function collectReachableLayerIds(rootNodeIds, recordsById, prefix) {
      const result = [];
      const seen = {};
      const stack = [];
      for (const prefixedRootId of rootNodeIds || []) {
        const rawRootId = stripPrefix(prefixedRootId, prefix);
        if (rawRootId) stack.push(rawRootId);
      }
      while (stack.length > 0) {
        const id = stack.pop();
        if (!id || seen[id] || !recordsById[id]) continue;
        seen[id] = true;
        result.push(id);
        const children = Array.isArray(recordsById[id].childIds) ? recordsById[id].childIds : [];
        for (let index = children.length - 1; index >= 0; index--) {
          stack.push(children[index]);
        }
      }
      return result;
    }

        const instance = nodes[id];
        if (!instance || (childIds[id] || []).length > 0) continue;
        const templateRoot = mgFindTemplateRoot(instance, nodes, childIds);
        if (!templateRoot) continue;

        const sourceIds = mgSubtreeIds(templateRoot.id, nodes, childIds);
        if (sourceIds.length === 0) continue;
        for (const sourceId of sourceIds) {
          const cloneId = id + "/" + sourceId;
          if (!nodes[cloneId] && !additions[cloneId]) {
            additions[cloneId] = mgCloneNodeForInstance(nodes[sourceId], id, templateRoot.id);
          }
        }
      }

      for (const id in additions) nodes[id] = additions[id];
      return Object.keys(additions).length;
    }

    // The document header lists the real MasterGo pages as records shaped
    // `\x01 <id> \x00 \x02 <name> \x00 \x03`. Node records share that shape but
    // their `\x02` value is an id, so keep only records whose name is not an id.
    function parseMgPages(bytes, headerEnd) {
      const pages = [];
      const seen = {};
      const idRe = /^[0-9]+:[0-9A-Za-z]+$/;
      const limit = Math.min(headerEnd > 0 ? headerEnd : bytes.length, 200000);
      let p = 0;
      while (p < limit) {
        if (bytes[p] === 0x01) {
          let q = p + 1;
          while (q < limit && bytes[q] !== 0x00) q++;
          const id = decodeUtf8(bytes.subarray(p + 1, q));
          if (idRe.test(id) && bytes[q + 1] === 0x02) {
            let r = q + 2;
            while (r < limit && bytes[r] !== 0x00) r++;
            const name = decodeUtf8(bytes.subarray(q + 2, r));
            if (bytes[r + 1] === 0x03 && name) {
              // Page records (name is human text) form a contiguous run at the
              // very start. The first record whose `02` value is itself an id is a
              // node record — that marks the end of the page table, so stop there
              // to avoid picking up later component-property records.
              if (idRe.test(name)) break;
              // The `03` field is a fractional-index sort code (e.g. a4, a5P, a6)
              // that defines the page's display order.
              let c = r + 2;
              while (c < limit && bytes[c] !== 0x00) c++;
              const code = decodeUtf8(bytes.subarray(r + 2, c));
              if (!seen[id]) { seen[id] = true; pages.push({ id: id, name: name, code: code }); }
              p = c + 1;
              continue;
            }
          }
        }
        p++;
      }
      // MasterGo orders pages by the `03` sort code, not by their physical position
      // in the header. Lexicographic order of that code = the display order.
      pages.sort((a, b) => (a.code < b.code ? -1 : a.code > b.code ? 1 : 0));
      return pages;
    }

    function mgFallbackPageName(fileName) {
      const base = mgBasename(fileName || "mg-file").replace(/\.mg$/i, "");
      const us = base.lastIndexOf("_");
      return us >= 0 && us + 1 < base.length ? base.slice(us + 1) : base;
    }

    function mgIsFallbackRootNode(n) {
      if (!n || !n.type || n.parent != null) return false;
      const name = n.name || "";
      // Component sets are still decoded and can be used as instance templates,
      // but partial-page zip baselines do not restore them as page roots.
      return name.indexOf("Component_Set") < 0 && name.indexOf("组件集") < 0;
    }

    function convertMgPackageToV2Entries(zipEntries, fileName) {
      const documentBytes = getEntryByName(zipEntries, "document");
      if (!documentBytes) throw new Error(`"${fileName}" 不是有效的 .mg 文件（缺少 document）`);

      let meta = {};
      const metaBytes = getEntryByName(zipEntries, "meta.json");
      if (metaBytes) { try { meta = JSON.parse(decodeUtf8(metaBytes)); } catch (e) { /* ignore */ } }

      const { nodes, paints } = mgDecodeNativeNodes(documentBytes);
      const embeddedProps = mgExtractEmbeddedProps(documentBytes);
      const embeddedIndex = mgBuildEmbeddedIndex(embeddedProps);
      const embeddedOverlayUsed = {};
      let nodeIds = Object.keys(nodes);
      if (nodeIds.length === 0) throw new Error(`未能从 "${fileName}" 解析出任何图层`);

      // The real MasterGo pages come from the document header, in display order.
      // Partial native .mg exports can omit that header; when no pages are found,
      // the fallback below restores a single page from typed parent=null roots.
      const mgPages = parseMgPages(documentBytes, -1);

      // Child lists (parent → children) and per-parent index.
      let childIds = {};
      function sortNativeChildIds(ids) {
        ids.sort((a, b) => {
          const ac = nodes[a] && nodes[a].code ? nodes[a].code : "";
          const bc = nodes[b] && nodes[b].code ? nodes[b].code : "";
          if (ac !== bc) return ac < bc ? -1 : 1;
          return a < b ? -1 : a > b ? 1 : 0;
        });
      }
      function rebuildChildIds() {
        childIds = {};
        for (const id of nodeIds) childIds[id] = [];
        for (const id of nodeIds) {
          const p = nodes[id].parent;
          if (p != null) (childIds[p] = childIds[p] || []).push(id); // parent may be a page id
        }
        for (const p in childIds) sortNativeChildIds(childIds[p]);
      }
      rebuildChildIds();
      const expandedInstanceCount = mgExpandInstanceLikeNodes(nodes, childIds);
      if (expandedInstanceCount > 0) {
        nodeIds = Object.keys(nodes);
        rebuildChildIds();
      }
      const indexInParent = {};
      for (const p in childIds) childIds[p].forEach((cid, ix) => { indexInParent[cid] = ix; });

      function subtreeOf(root) {
        const seen = {};
        const stack = [root];
        const list = [];
        while (stack.length) {
          const id = stack.pop();
          if (seen[id] || !nodes[id] || !nodes[id].type) continue;
          seen[id] = true;
          list.push(id);
          const kids = childIds[id] || [];
          for (let k = kids.length - 1; k >= 0; k--) stack.push(kids[k]);
        }
        return list;
      }

      // A page's content = roots whose parent IS that page id. This naturally drops
      // off-canvas component-master subtrees (their roots are parented to a registry
      // id, not a page) and dedups duplicate copies (only one copy is parented to the
      // page).
      const reachable = {};
      const pageList = [];
      const rootIndexOverride = {};
      for (const pg of mgPages) {
        const roots = (childIds[pg.id] || []).filter(r => nodes[r] && nodes[r].type);
        let count = 0;
        for (const r of roots) for (const id of subtreeOf(r)) { if (!reachable[id]) { reachable[id] = true; count++; } }
        if (count > 0) pageList.push({ name: pg.name, roots: roots, count: count });
      }

      if (Object.keys(reachable).length === 0) {
        const roots = nodeIds.filter(id => mgIsFallbackRootNode(nodes[id]));
        sortNativeChildIds(roots);
        let count = 0;
        roots.forEach((id, ix) => { rootIndexOverride[id] = ix; });
        for (const r of roots) for (const id of subtreeOf(r)) { if (!reachable[id]) { reachable[id] = true; count++; } }
        if (count > 0) pageList.push({ name: mgFallbackPageName(fileName), roots: roots, count: count });
      }
      if (Object.keys(reachable).length === 0) throw new Error(`"${fileName}" 中没有可识别的页面图层`);

      // Layer records — reachable nodes only.
      const records = [];
      const nativeEmbeddedMatches = {};
      for (const id in reachable) {
        const n = nodes[id];
        const props = mgNativeProps(n, nodes, paints);
        const preferredParentId = nativeEmbeddedMatches[n.parent] ? nativeEmbeddedMatches[n.parent].id : null;
        const overlay = mgFindEmbeddedOverlay(props, embeddedIndex, embeddedOverlayUsed, preferredParentId);
        if (overlay) nativeEmbeddedMatches[id] = overlay;
        mgApplyEmbeddedOverlay(props, overlay, !!preferredParentId);
        records.push({
          version: 2,
          id: id,
          pageId: "",
          parentId: (nodes[n.parent] ? n.parent : null),
          index: rootIndexOverride[id] != null ? rootIndexOverride[id] : (indexInParent[id] || 0),
          name: n.name || id,
          childIds: (childIds[id] || []).filter(c => nodes[c] && nodes[c].type),
          props: props
        });
      }
      mgApplyButtonInstanceTextCentering(records);
      mgApplyCardInstanceOverrides(records);
      console.log(`[.mg] 原生解码 ${pageList.length} 页，${records.length} 图层（共 ${nodeIds.length} 条记录，展开实例子层 ${expandedInstanceCount} 个，嵌入 props ${embeddedProps.length} 个，跳过画布外/注册表节点）`);

      const encoder = new TextEncoder();
      const out = {};
      const recordsById = {};
      for (const record of records) recordsById[record.id] = record;

      function writeLayerChunks(folder, pageId, pageRecords) {
        const chunkPaths = [];
        let chunkRecords = [];
        let chunkBytes = 0;
        function flushChunk() {
          if (chunkRecords.length === 0) return;
          const chunkPath = `${folder}/layers/layers-${String(chunkPaths.length).padStart(4, "0")}.json`;
          out[chunkPath] = encoder.encode(JSON.stringify({
            schema: "mastergo2figma.layers.v2",
            version: 2,
            pageId: pageId,
            records: chunkRecords
          }));
          chunkPaths.push(chunkPath);
          chunkRecords = [];
          chunkBytes = 0;
        }
        for (const record of pageRecords) {
          const recordBytes = JSON.stringify(record).length;
          if (chunkRecords.length > 0 && (chunkRecords.length >= 16 || chunkBytes + recordBytes > 64 * 1024)) flushChunk();
          chunkRecords.push(record);
          chunkBytes += recordBytes + (chunkRecords.length > 1 ? 1 : 0);
          if (chunkRecords.length >= 16 || chunkBytes >= 64 * 1024) flushChunk();
        }
        flushChunk();
        return chunkPaths;
      }

      function collectPageRecords(pg) {
        const seen = {};
        const result = [];
        for (const root of pg.roots) {
          for (const id of subtreeOf(root)) {
            if (seen[id] || !recordsById[id]) continue;
            seen[id] = true;
            result.push(recordsById[id]);
          }
        }
        return result;
      }

      // Carry over image bytes and register them under both the file name and the
      // bare hash, so an image fill's imageRef resolves regardless of which form
      // MasterGo used.
      const assets = {};
      let imageAssetCount = 0;
      for (const path in zipEntries) {
        if (!/^images\//i.test(path)) continue;
        const bytes = zipEntries[path];
        if (!bytes) continue;
        out[path] = bytes;
        const baseName = path.slice(path.lastIndexOf("/") + 1);
        if (!baseName) continue;
        const bareName = baseName.replace(/\.[^.]+$/, "");
        imageAssetCount++;
        assets[baseName] = { key: baseName, fileName: baseName, path: path };
        if (bareName && bareName !== baseName) {
          assets[bareName] = { key: bareName, fileName: baseName, path: path };
        }
      }

      const manifestPages = [];
      let totalLayerCount = 0;
      for (let pi = 0; pi < pageList.length; pi++) {
        const pg = pageList[pi];
        const folder = `pages/page-${pi}`;
        const pageFile = `${folder}/index.json`;
        const pageId = `mgpage-${pi}`;
        const layerChunks = writeLayerChunks(folder, pageId, collectPageRecords(pg));
        out[pageFile] = encoder.encode(JSON.stringify({
          schema: "mastergo2figma.page.v2",
          version: 2,
          id: pageId,
          name: pg.name,
          folder: folder,
          rootNodeIds: pg.roots,
          layerChunks: layerChunks,
          layerCount: pg.count
        }));
        manifestPages.push({ id: pageId, name: pg.name, folder: folder, pageFile: pageFile, layerCount: pg.count });
        totalLayerCount += pg.count;
      }

      out["manifest.json"] = encoder.encode(JSON.stringify({
        schema: "mastergo2figma.package.v2",
        version: 2,
        source: "mastergo",
        documentId: (meta && typeof meta.fileId === "number") ? meta.fileId : 0,
        exportedAt: new Date().toISOString(),
        scope: "mg-file",
        pages: manifestPages,
        assets: assets,
        stats: {
          pageCount: manifestPages.length,
          layerCount: totalLayerCount,
          imageAssetCount: imageAssetCount,
          missingImageAssetCount: 0
        }
      }));

      return out;
    }


  global.MasterGoMg = {
    isMgPackage: isMgPackage,
    convertMgPackageToV2Entries: convertMgPackageToV2Entries
  };

  if (typeof module !== "undefined" && module.exports) {
    module.exports = global.MasterGoMg;
  }
})(typeof window !== "undefined" ? window : globalThis);
    // END generated MasterGo .mg package decoder
    function findEndOfCentralDirectory(view) {
      for (let offset = view.byteLength - 22; offset >= 0; offset--) {
        if (view.getUint32(offset, true) === 0x06054b50) return offset;
      }
      return -1;
    }
  </script>
</body>
